services:
  mysql:
    image: mysql:8.4
    container_name: personal-crm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - ./deploy/data/mysql:/var/lib/mysql
    networks:
      - personal-crm-network

  redis:
    image: redis:7.4-alpine
    container_name: personal-crm-redis
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ./deploy/data/redis:/data
    networks:
      - personal-crm-network

  backend:
    build:
      context: ./personal_crm_backend
      dockerfile: Dockerfile
    container_name: personal-crm-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-always}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TIMEOUT_MS: ${REDIS_TIMEOUT_MS:-3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-7200}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      CONTACT_AVATAR_DIR: ${CONTACT_AVATAR_DIR:-contact-avatar}
      USER_AVATAR_DIR: ${USER_AVATAR_DIR:-user-avatar}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-mock-key}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RESEND_API_KEY: ${RESEND_API_KEY:-mock-key}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Personal CRM <no-reply@example.com>}
      QWEATHER_API_KEY: ${QWEATHER_API_KEY}
      QWEATHER_API_HOST: ${QWEATHER_API_HOST:-nk3dnacruh.re.qweatherapi.com}
      IP_API_URL: ${IP_API_URL:-http://ip-api.com/json/}
      WEATHER_DEFAULT_CITY: ${WEATHER_DEFAULT_CITY:-Hangzhou}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./deploy/data/uploads:${UPLOAD_DIR:-/app/uploads}
    networks:
      - personal-crm-network

  nginx:
    image: nginx:1.29-alpine
    container_name: personal-crm-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./personal_crm_web/dist:/usr/share/nginx/html:ro
    networks:
      - personal-crm-network

networks:
  personal-crm-network:
    driver: bridge

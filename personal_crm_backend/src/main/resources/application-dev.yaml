spring:
  config:
    import:
      - optional:classpath:application-local.yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:personal_crm}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 5MB
  data:
    redis:
      host: 10.67.215.250
      port: 6379
      password: ethan_pass
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:mock-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: info
    com.weiqiang.personal_crm_backend: debug

jwt:
  secret: ${JWT_SECRET:personal-crm-dev-secret-key-change-me}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
  issuer: personal-crm

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    contact-avatar-dir: ${CONTACT_AVATAR_DIR:contact-avatar}
    user-avatar-dir: ${USER_AVATAR_DIR:user-avatar}

weather:
  api-key: ${QWEATHER_API_KEY:your_qweather_api_key_placeholder}
  api-host: ${QWEATHER_API_HOST:nk3dnacruh.re.qweatherapi.com}
  ip-api-url: ${IP_API_URL:http://ip-api.com/json/}
  default-city: ${WEATHER_DEFAULT_CITY:曹妃甸区}

resend:
  api-key: ${RESEND_API_KEY:mock-key}
  from-email: ${RESEND_FROM_EMAIL:Personal CRM <no-reply@mail.weiqiang.me>}







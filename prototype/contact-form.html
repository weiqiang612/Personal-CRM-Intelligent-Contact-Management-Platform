<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增联系人 - Personal CRM</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <!-- Lucide 图标 -->
  <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.97) 0%, rgba(249, 251, 255, 0.9) 36%, rgba(243, 246, 251, 0.96) 100%),
        linear-gradient(180deg, #f8fbff 0%, #f3f6fb 100%);
    }

    .topbar {
      padding: 16px 32px 6px;
      align-items: flex-start;
    }

    .page-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #0f172a;
    }

    .page-subtitle {
      margin-top: 0;
      font-size: 14px;
      color: #7b8798;
    }

    .content-body {
      padding: 8px 30px 20px;
    }

    /* 表单特有两栏布局 */
    .form-layout {
      display: grid;
      grid-template-columns: minmax(280px, 332px) minmax(0, 1fr);
      gap: 20px;
      padding: 18px;
      border-radius: 22px;
      border-color: rgba(226, 232, 240, 0.96);
      box-shadow: 0 22px 54px -42px rgba(15, 23, 42, 0.18);
      background:
        radial-gradient(circle at top right, rgba(239, 246, 255, 0.72), rgba(255, 255, 255, 0) 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(250, 252, 255, 0.98) 100%);
    }

    /* 头像上传框 */
    .avatar-upload-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 24px;
      border: 1px solid rgba(226, 232, 240, 0.96);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      height: 100%;
      min-height: 438px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .avatar-upload-placeholder {
      width: 142px;
      height: 142px;
      border-radius: var(--radius-full);
      border: 2px dashed #dbe3ee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #ffffff 0%, #f8fbff 100%);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 38px -30px rgba(15, 23, 42, 0.18);
    }

    .avatar-upload-placeholder i {
      width: 52px;
      height: 52px;
      color: #b2bac7;
    }

    .avatar-preview-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .upload-tip {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      text-align: center;
      line-height: 1.5;
    }

    /* 二列网格表单 */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 20px;
    }

    .col-span-2 {
      grid-column: span 2;
    }

    .form-group-label {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .required-star {
      color: var(--color-danger);
    }

    .input-error-msg {
      font-size: 11px;
      color: var(--color-danger);
      margin-top: 4px;
      display: none;
    }

    .form-group.has-error input {
      border-color: var(--color-danger);
    }

    .form-group.has-error .input-error-msg {
      display: block;
    }

    /* 标签模拟选择框 */
    .tag-select-wrapper {
      position: relative;
    }

    .tag-chips-input {
      min-height: 44px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 6px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      background-color: #fff;
      cursor: pointer;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
    }

    .tag-chip i {
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .tag-chip i:hover {
      color: var(--color-danger);
    }

    .tag-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      padding: 10px;
      display: none;
      z-index: 20;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag-option {
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all var(--transition-fast);
    }

    .tag-option:hover {
      transform: scale(1.05);
    }

    .form-actions-bar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border-color);
    }

    .input-control,
    .select-control {
      height: 44px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 13px;
      border-color: #dfe6ef;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .input-control::placeholder {
      color: #a0a9b8;
    }

    #birthday.input-control {
      padding-right: 16px;
    }

    .form-group.has-error .input-control,
    .form-group.has-error .select-control {
      border-color: #fca5a5;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08);
    }

    .avatar-upload-card .btn {
      min-width: 126px;
      height: 38px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .avatar-upload-card .btn i {
      width: 16px;
      height: 16px;
    }

    .form-actions-bar .btn {
      min-width: 112px;
      height: 40px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .form-actions-bar .btn-primary {
      min-width: 132px;
      box-shadow: 0 16px 30px -22px rgba(37, 99, 235, 0.55);
    }

    @media (max-width: 1280px) {
      .form-layout {
        grid-template-columns: 1fr;
      }

      .avatar-upload-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-menu-wrapper">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <i data-lucide="users-round"></i>
          </div>
          <div class="brand-info">
            <span class="brand-name">Personal CRM</span>
            <span class="brand-desc">智能联系人管理系统</span>
          </div>
        </div>

        <ul class="sidebar-menu">
          <li class="menu-item">
            <a href="./dashboard.html">
              <i data-lucide="layout-dashboard"></i>
              <span>工作台</span>
            </a>
          </li>
          <li class="menu-item active">
            <a href="./contacts.html">
              <i data-lucide="users"></i>
              <span>联系人</span>
            </a>
          </li>
          <li class="menu-item">
            <a href="./todos.html">
              <i data-lucide="calendar-check"></i>
              <span>事项提醒</span>
            </a>
          </li>
          <li class="menu-item">
            <a href="./blacklist.html">
              <i data-lucide="shield-alert"></i>
              <span>黑名单</span>
            </a>
          </li>
          <li class="menu-item">
            <a href="./agent.html">
              <i data-lucide="sparkles"></i>
              <span>智能助手</span>
            </a>
          </li>
          <li class="menu-item">
            <a href="./settings.html">
              <i data-lucide="settings"></i>
              <span>设置</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <div class="upgrade-card">
          <h4 class="upgrade-card-title">升级到 Pro 专业版</h4>
          <p class="upgrade-card-desc">解锁更多智能分析与多端同步功能</p>
        </div>
        
        <a href="./settings.html" class="user-profile-bar">
          <div class="user-avatar-container">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop&q=60" alt="Avatar" class="user-avatar">
            <span class="user-online-dot"></span>
          </div>
          <div class="user-meta">
            <span class="user-name">Ethan</span>
            <span class="user-email">ethan@example.com</span>
          </div>
        </a>
        
        <button class="collapsed-toggle" id="collapsedToggle" onclick="toggleSidebar()">
          <i data-lucide="chevron-left" id="toggleIcon"></i>
        </button>
      </div>
    </aside>

    <!-- 主体区域 -->
    <main class="main-wrapper">
      <!-- 顶栏 -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="page-title-group">
            <a href="./contacts.html" class="back-link">
              <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
            </a>
            <h2 class="page-title" id="pageMainTitle">新增联系人</h2>
          </div>
          <span class="page-subtitle">填写联系人资料并上传头像</span>
        </div>
      </header>

      <!-- 主体内容 -->
      <div class="content-body">
        
        <form id="contactForm" onsubmit="handleFormSubmit(event)">
          <div class="card form-layout">
            <!-- 左侧：头像上传 -->
            <div class="avatar-upload-card">
              <div class="avatar-upload-placeholder" id="avatarBox" onclick="triggerFileUpload()">
                <i data-lucide="user" id="avatarPlaceholderIcon"></i>
                <img id="avatarPreview" class="avatar-preview-img" alt="头像预览">
              </div>
              <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
              <button type="button" class="btn btn-secondary btn-sm" onclick="triggerFileUpload()" style="color:var(--color-primary);border-color:var(--color-primary-border);">
                <i data-lucide="upload" style="width:12px;height:12px;"></i>
                上传头像
              </button>
              <span class="upload-tip">支持 jpg/png/jpeg/webp，最大 2MB</span>
            </div>

            <!-- 右侧：表单区 -->
            <div style="display: flex; flex-direction: column; justify-content: space-between;">
              <div class="fields-grid">
                <!-- 姓名 -->
                <div class="form-group" id="nameGroup">
                  <label class="form-group-label" for="username">姓名 <span class="required-star">*</span></label>
                  <input type="text" id="username" class="input-control" placeholder="请输入联系人姓名">
                  <span class="input-error-msg">请输入联系人姓名</span>
                </div>

                <!-- 性别 -->
                <div class="form-group">
                  <label class="form-group-label" for="gender">性别</label>
                  <select id="gender" class="select-control" style="width: 100%;">
                    <option value="">请选择性别</option>
                    <option value="male">男</option>
                    <option value="female">女</option>
                  </select>
                </div>

                <!-- 手机号 -->
                <div class="form-group" id="phoneGroup">
                  <label class="form-group-label" for="phone">手机号 <span class="required-star">*</span></label>
                  <input type="text" id="phone" class="input-control" placeholder="请输入手机号">
                  <span class="input-error-msg">手机号格式不正确</span>
                </div>

                <!-- 邮箱 -->
                <div class="form-group">
                  <label class="form-group-label" for="email">邮箱</label>
                  <input type="email" id="email" class="input-control" placeholder="请输入邮箱">
                </div>

                <!-- QQ -->
                <div class="form-group">
                  <label class="form-group-label" for="qq">QQ</label>
                  <input type="text" id="qq" class="input-control" placeholder="请输入 QQ 号">
                </div>

                <!-- 微信 -->
                <div class="form-group">
                  <label class="form-group-label" for="wechat">微信</label>
                  <input type="text" id="wechat" class="input-control" placeholder="请输入微信号">
                </div>

                <!-- 详细地址 -->
                <div class="form-group col-span-2">
                  <label class="form-group-label" for="address">地址</label>
                  <input type="text" id="address" class="input-control" placeholder="请输入详细地址">
                </div>

                <!-- 邮编 -->
                <div class="form-group">
                  <label class="form-group-label" for="zipcode">邮编</label>
                  <input type="text" id="zipcode" class="input-control" placeholder="请输入邮编">
                </div>

                <!-- 生日 -->
                <div class="form-group" style="position: relative;">
                  <label class="form-group-label" for="birthday">生日</label>
                  <input type="date" id="birthday" class="input-control" style="width: 100%;">
                </div>

                <!-- 关系标签 -->
                <div class="form-group col-span-2">
                  <label class="form-group-label">标签</label>
                  <div class="tag-select-wrapper">
                    <div class="tag-chips-input" onclick="toggleTagDropdown(event)" id="tagChipsInput">
                      <!-- 标签小片 -->
                      <span class="placeholder-text" style="color:#9ca3af;font-size:13px;" id="tagPlaceholder">点击选择或添加标签...</span>
                    </div>
                    <!-- 下拉选择 -->
                    <div class="tag-dropdown" id="tagDropdown">
                      <span class="tag-option tag-class" onclick="addTag('同学', 'tag-class')">同学</span>
                      <span class="tag-option tag-friend" onclick="addTag('朋友', 'tag-friend')">朋友</span>
                      <span class="tag-option tag-partner" onclick="addTag('产品合作', 'tag-partner')">产品合作</span>
                      <span class="tag-option tag-important" onclick="addTag('重要', 'tag-important')">重要</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 操作按钮 -->
              <div class="form-actions-bar">
                <a href="./contacts.html" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存联系人</button>
              </div>
            </div>
          </div>
        </form>

      </div>
    </main>
  </div>

  <script>
    const SIDEBAR_STATE_KEY = 'personal-crm-sidebar-collapsed';

    function syncSidebarState() {
      const sidebar = document.getElementById('sidebar');
      const toggleIcon = document.getElementById('toggleIcon');
      const isCollapsed = localStorage.getItem(SIDEBAR_STATE_KEY) === 'true';
      sidebar.classList.toggle('collapsed', isCollapsed);
      toggleIcon.setAttribute('data-lucide', isCollapsed ? 'chevron-right' : 'chevron-left');
    }

    syncSidebarState();
    lucide.createIcons();

    // 侧边栏折叠切换
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const toggleIcon = document.getElementById('toggleIcon');
      sidebar.classList.toggle('collapsed');
      const isCollapsed = sidebar.classList.contains('collapsed');
      localStorage.setItem(SIDEBAR_STATE_KEY, String(isCollapsed));
      toggleIcon.setAttribute('data-lucide', isCollapsed ? 'chevron-right' : 'chevron-left');
      lucide.createIcons();
    }

    // 头像上传触发
    function triggerFileUpload() {
      document.getElementById('fileInput').click();
    }

    // 头像本地预览
    function previewImage(event) {
      const reader = new FileReader();
      reader.onload = function() {
        const preview = document.getElementById('avatarPreview');
        const icon = document.getElementById('avatarPlaceholderIcon');
        
        preview.src = reader.result;
        preview.style.display = 'block';
        icon.style.display = 'none';
        
        document.getElementById('avatarBox').style.borderStyle = 'solid';
      }
      reader.readAsDataURL(event.target.files[0]);
    }

    // 标签多选控制
    function toggleTagDropdown(event) {
      event.stopPropagation();
      const dropdown = document.getElementById('tagDropdown');
      dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
    }

    // 关闭下拉框
    document.addEventListener('click', function() {
      document.getElementById('tagDropdown').style.display = 'none';
    });

    const activeTags = new Set();

    function addTag(name, className) {
      if (activeTags.has(name)) return;
      activeTags.add(name);

      const inputDiv = document.getElementById('tagChipsInput');
      const placeholder = document.getElementById('tagPlaceholder');
      if (placeholder) placeholder.style.display = 'none';

      const chip = document.createElement('span');
      chip.className = `badge ${className} tag-chip`;
      chip.innerHTML = `${name} <i data-lucide="x" style="width:12px;height:12px;" onclick="removeTag(event, '${name}')"></i>`;
      
      // 在输入框内添加
      inputDiv.appendChild(chip);
      lucide.createIcons();
    }

    function removeTag(event, name) {
      event.stopPropagation();
      activeTags.delete(name);
      event.target.closest('.tag-chip').remove();

      if (activeTags.size === 0) {
        document.getElementById('tagPlaceholder').style.display = 'block';
      }
    }

    // 表单提交与校验模拟
    function handleFormSubmit(event) {
      event.preventDefault();
      
      const name = document.getElementById('username').value.trim();
      const phone = document.getElementById('phone').value.trim();
      
      let hasError = false;

      // 验证姓名
      const nameGroup = document.getElementById('nameGroup');
      if (!name) {
        nameGroup.classList.add('has-error');
        hasError = true;
      } else {
        nameGroup.classList.remove('has-error');
      }

      // 验证手机号 (简单要求不为空，且只含数字)
      const phoneGroup = document.getElementById('phoneGroup');
      const phoneRegex = /^[0-9\s+-]{7,15}$/;
      if (!phone || !phoneRegex.test(phone)) {
        phoneGroup.classList.add('has-error');
        hasError = true;
      } else {
        phoneGroup.classList.remove('has-error');
      }

      if (!hasError) {
        // 保存成功，跳转到列表页
        window.location.href = './contacts.html';
      }
    }

    // 如果 URL 中含有编辑 ID，模拟编辑状态
    window.addEventListener('DOMContentLoaded', () => {
      // 通过简单逻辑模拟编辑页
      if (window.location.search || window.location.hash) {
        document.getElementById('pageMainTitle').innerText = '编辑联系人';
        document.getElementById('username').value = '张雨薇';
        document.getElementById('gender').value = 'female';
        document.getElementById('phone').value = '13800138000';
        document.getElementById('email').value = 'zhang.yw@example.com';
        document.getElementById('wechat').value = 'zhang_yw';
        document.getElementById('qq').value = '89234567';
        document.getElementById('address').value = '杭州市西湖区';
        document.getElementById('zipcode').value = '310000';
        document.getElementById('birthday').value = '1998-04-12';
        
        // 预设头像
        const preview = document.getElementById('avatarPreview');
        const icon = document.getElementById('avatarPlaceholderIcon');
        preview.src = "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=120&auto=format&fit=crop&q=60";
        preview.style.display = 'block';
        icon.style.display = 'none';
        
        addTag('同学', 'tag-class');
        addTag('朋友', 'tag-friend');
      }
    });
  </script>
</body>
</html>
